services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pbx_portal}
      POSTGRES_USER: ${POSTGRES_USER:-pbx_portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pbx_portal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    init: true
    restart: unless-stopped
    command:
      [
        "gunicorn",
        "--bind",
        "0.0.0.0:5000",
        "--workers",
        "${GUNICORN_WORKERS:-2}",
        "--threads",
        "${GUNICORN_THREADS:-4}",
        "--timeout",
        "${GUNICORN_TIMEOUT:-120}",
        "--graceful-timeout",
        "${GUNICORN_GRACEFUL_TIMEOUT:-30}",
        "--keep-alive",
        "${GUNICORN_KEEPALIVE:-5}",
        "--max-requests",
        "${GUNICORN_MAX_REQUESTS:-1000}",
        "--max-requests-jitter",
        "${GUNICORN_MAX_REQUESTS_JITTER:-100}",
        "app:app",
      ]
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-pbx_portal}
      POSTGRES_USER: ${POSTGRES_USER:-pbx_portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pbx_portal}
      DATABASE_URL: ${DATABASE_URL:-}
      PBX_DB_HOST: ${PBX_DB_HOST:-}
      PBX_DB_PORT: ${PBX_DB_PORT:-3306}
      PBX_DB_USER: ${PBX_DB_USER:-}
      PBX_DB_PASSWORD: ${PBX_DB_PASSWORD:-}
      PBX_DB_NAME: ${PBX_DB_NAME:-asteriskcdrdb}
      PBX_CONFIG_DB_NAME: ${PBX_CONFIG_DB_NAME:-asterisk}
      PBX_DB_CONNECT_TIMEOUT_SECONDS: ${PBX_DB_CONNECT_TIMEOUT_SECONDS:-15}
      PBX_DB_READ_TIMEOUT_SECONDS: ${PBX_DB_READ_TIMEOUT_SECONDS:-180}
      PBX_DB_WRITE_TIMEOUT_SECONDS: ${PBX_DB_WRITE_TIMEOUT_SECONDS:-30}
      PBX_DB_RETRY_ATTEMPTS: ${PBX_DB_RETRY_ATTEMPTS:-3}
      PBX_DB_RETRY_BASE_DELAY_SECONDS: ${PBX_DB_RETRY_BASE_DELAY_SECONDS:-1}
      PBX_DB_RETRY_MAX_DELAY_SECONDS: ${PBX_DB_RETRY_MAX_DELAY_SECONDS:-30}
      PBX_DB_POOL_SIZE: ${PBX_DB_POOL_SIZE:-5}
      PBX_DB_USE_PURE: ${PBX_DB_USE_PURE:-false}
      PBX_DB_POOL_ACQUIRE_TIMEOUT_SECONDS: ${PBX_DB_POOL_ACQUIRE_TIMEOUT_SECONDS:-30}
      PBX_SYNC_QUERY_LIMIT: ${PBX_SYNC_QUERY_LIMIT:-1000}
      PBX_SYNC_WINDOW_MINUTES: ${PBX_SYNC_WINDOW_MINUTES:-30}
      PBX_SYNC_MIN_WINDOW_SECONDS: ${PBX_SYNC_MIN_WINDOW_SECONDS:-60}
      PBX_SYNC_RATE_LIMIT_MS: ${PBX_SYNC_RATE_LIMIT_MS:-0}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      AUTO_SYNC_ENABLED: ${AUTO_SYNC_ENABLED:-true}
      SYNC_LEADER_LOCK_FILE: ${SYNC_LEADER_LOCK_FILE:-/tmp/pbx-portal-sync-scheduler.lock}
      SYNC_INTERVAL_SECONDS: ${SYNC_INTERVAL_SECONDS:-600}
      SYNC_INITIAL_DELAY_SECONDS: ${SYNC_INITIAL_DELAY_SECONDS:-20}
      INITIAL_SYNC_DAYS: ${INITIAL_SYNC_DAYS:-1}
      SESSION_COOKIE_HTTPONLY: ${SESSION_COOKIE_HTTPONLY:-true}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-Lax}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/health').status == 200 else 1)",
        ]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 6
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_EXPOSE_PORT:-5000}:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    environment:
      PBX_API_URL: http://backend:5000
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok ? 0 : 1)).catch(()=>process.exit(1))",
        ]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 6
    ports:
      - "${FRONTEND_BIND_HOST:-127.0.0.1}:${FRONTEND_EXPOSE_PORT:-3000}:3000"

volumes:
  postgres_data:

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pbx_portal}
      POSTGRES_USER: ${POSTGRES_USER:-pbx_portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pbx_portal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-pbx_portal}
      POSTGRES_USER: ${POSTGRES_USER:-pbx_portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pbx_portal}
      DATABASE_URL: ${DATABASE_URL:-}
      PBX_DB_HOST: ${PBX_DB_HOST:-}
      PBX_DB_PORT: ${PBX_DB_PORT:-3306}
      PBX_DB_USER: ${PBX_DB_USER:-}
      PBX_DB_PASSWORD: ${PBX_DB_PASSWORD:-}
      PBX_DB_NAME: ${PBX_DB_NAME:-asteriskcdrdb}
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      PBX_API_URL: http://backend:5000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
